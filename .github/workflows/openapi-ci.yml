name: OpenAPI CI

on:
  push:
    branches: [main]
    paths:
      - 'token-usage-api.yaml'
      - 'redocly.yaml'
      - 'scripts/validate_examples.py'
      - 'tests/conformance_check.py'
      - '.github/workflows/openapi-ci.yml'
  pull_request:
    paths:
      - 'token-usage-api.yaml'
      - 'redocly.yaml'
      - 'scripts/validate_examples.py'
      - 'tests/conformance_check.py'
      - '.github/workflows/openapi-ci.yml'

jobs:
  redocly-lint:
    name: Redocly lint (구조/정합성)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint OpenAPI (current spec)
        run: npx --yes @redocly/cli@latest lint token-usage-api.yaml

  validate-examples:
    name: Examples + if/then regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install "jsonschema>=4.21" "pyyaml>=6"
      - name: Validate examples and conditional constraints
        run: python scripts/validate_examples.py
      - name: Conformance checker self-test (demo)
        run: python tests/conformance_check.py --demo
